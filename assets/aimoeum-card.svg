<svg width="700" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf91f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="700" height="220" fill="url(#cardBg)" rx="16" stroke="#30363d" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="700" height="3" fill="url(#accent)" rx="16"/>

  <!-- LIVE badge -->
  <rect x="590" y="20" width="80" height="26" fill="#1a7f37" rx="13" opacity="0.9"/>
  <circle cx="610" cy="33" r="4" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="640" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">LIVE</text>

  <!-- Service name -->
  <text x="40" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#f0f6fc" font-weight="700">AI 모음</text>
  <text x="145" y="55" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#58a6ff" font-weight="400">aimoeum.com</text>

  <!-- Description -->
  <text x="40" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#8b949e">다양한 AI 도구의 기능과 특징을 한국어로 소개하는 큐레이션 웹서비스</text>

  <!-- Stats -->
  <text x="40" y="125" font-family="'SF Mono', 'Fira Code', monospace" font-size="28" fill="#58a6ff" font-weight="700" filter="url(#glow)">271+</text>
  <text x="130" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e">AI Tools</text>

  <text x="220" y="125" font-family="'SF Mono', 'Fira Code', monospace" font-size="28" fill="#bf91f7" font-weight="700" filter="url(#glow)">6</text>
  <text x="250" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e">Categories</text>

  <!-- Divider line -->
  <rect x="40" y="145" width="620" height="1" fill="#30363d"/>

  <!-- Tech stack labels -->
  <rect x="40" y="165" width="72" height="26" fill="#0d1117" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="76" y="182" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#f0f6fc">Next.js</text>

  <rect x="122" y="165" width="85" height="26" fill="#0d1117" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="164" y="182" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#3178c6">TypeScript</text>

  <rect x="217" y="165" width="72" height="26" fill="#0d1117" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="253" y="182" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#06b6d4">Tailwind</text>

  <rect x="299" y="165" width="78" height="26" fill="#0d1117" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="338" y="182" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#3fcf8e">Supabase</text>

  <rect x="387" y="165" width="62" height="26" fill="#0d1117" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="418" y="182" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#f0f6fc">Vercel</text>

  <!-- Arrow hint -->
  <text x="660" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#58a6ff" opacity="0.6">→</text>
</svg>
